name: pincers
description: A minimal, standalone chat app for OpenClaw agents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_markdown: ^0.7.6
  web_socket_channel: ^3.0.2
  go_router: ^14.8.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  mime: ^2.0.0
  flutter_highlight: ^0.7.0
  markdown: ^7.0.0
  window_manager: ^0.3.8
  flutter_secure_storage: ^9.2.2
  cross_file: ^0.3.4+2
  desktop_drop: ^0.4.4
  cryptography: ^2.9.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
