name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup/flutter@v4
      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup/flutter@v4
      - run: flutter pub get
      - run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup/flutter@v4
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup/flutter@v4
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/runner/Release/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows/
      - name: Package Windows
        shell: bash
        run: |
          cd windows/
          powershell -Command "Compress-Archive -Path '*' -DestinationPath 'pincers-windows.zip' -Force"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apk/app-release.apk
            windows/pincers-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
